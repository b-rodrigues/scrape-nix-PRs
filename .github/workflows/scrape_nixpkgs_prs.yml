name: Scrape nixpkgs PRs

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of PRs to collect per run config"
        required: false
        default: "100"
      dry_run:
        description: "Dry run (find PRs but do not scrape or push)"
        type: boolean
        required: false
        default: false

concurrency:
  group: scrape-nixpkgs
  cancel-in-progress: false   # never interrupt a running scrape mid-push

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # needed to push scraped data back

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so incremental pushes don't clobber anything
          fetch-depth: 0

      # ── Nix / Python ────────────────────────────────────────────────────
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # ── Restore skip-list of already-scraped PRs ─────────────────────
      # We keep a flat file of every PR number ever scraped so we never
      # re-download it on subsequent runs.
      - name: Load scraped-PR registry
        id: registry
        run: |
          mkdir -p fodder
          if [ -f fodder/.scraped_prs ]; then
            echo "Existing registry: $(wc -l < fodder/.scraped_prs) entries"
          else
            touch fodder/.scraped_prs
            echo "No registry yet — starting fresh"
          fi

      # ── Run each scrape config ───────────────────────────────────────
      # configs/ holds one .env file per "dataset slice" you want to maintain.
      # The step below iterates over all matching env files.
      - name: Run scrape configs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIMIT_OVERRIDE: ${{ github.event.inputs.limit }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          LIMIT="${LIMIT_OVERRIDE:-100}"
          COMBINED_LIST="$(mktemp)"
          mapfile -t config_files < <(
            find configs -maxdepth 1 -type f \( -name "*.env" -o -name ".env" \) | sort
          )

          if [ "${#config_files[@]}" -eq 0 ]; then
            echo "No config env files found in configs/; exiting."
            exit 0
          fi

          for cfg in "${config_files[@]}"; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Config: $cfg"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # Each .env file exports: KEYWORDS, LABELS, MIN_REVIEWS, SINCE, OR_KEYWORDS, LIMIT
            unset KEYWORDS LABELS MIN_REVIEWS SINCE OR_KEYWORDS LIMIT_CFG
            source "$cfg"

            # Use LIMIT from env file if present, otherwise use global LIMIT
            CURRENT_LIMIT="${LIMIT_CFG:-$LIMIT}"
            find_args=(--limit "$CURRENT_LIMIT")
            [ -n "${KEYWORDS:-}" ] && find_args+=(--keywords "$KEYWORDS")
            [ -n "${LABELS:-}" ] && find_args+=(--labels "$LABELS")
            [ -n "${MIN_REVIEWS:-}" ] && find_args+=(--min-reviews "$MIN_REVIEWS")
            [ -n "${SINCE:-}" ] && find_args+=(--since "$SINCE")
            [ "${OR_KEYWORDS:-}" = "true" ] && find_args+=(--or-keywords)

            SLICE_LIST="$(mktemp)"
            nix run .#find-prs -- "${find_args[@]}" --out "$SLICE_LIST"

            echo "  Found $(wc -l < "$SLICE_LIST") candidates from $cfg"
            cat "$SLICE_LIST" >> "$COMBINED_LIST"
          done

          # Deduplicate and remove already-scraped PRs
          sort -u "$COMBINED_LIST" | grep -v "^$" | \
            comm -23 - <(sort fodder/.scraped_prs | grep -v "^$") \
            > new_prs.txt

          echo "New PRs to scrape: $(grep -c "^[0-9]\+$" new_prs.txt || echo 0)"
          cat new_prs.txt

      - name: Scrape new PRs
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only proceed if new_prs.txt contains actual PR numbers
          if ! grep -q "^[0-9]\+$" new_prs.txt; then
            echo "Nothing new to scrape — exiting early."
            exit 0
          fi

          # Use a list of PRs that are actually numbers
          grep "^[0-9]\+$" new_prs.txt > verified_prs.txt

          # Run scraper for up to 5 hours to leave time for commit/push
          # Writing directly to fodder/ so files are ready even if interrupted
          timeout 5h nix run .#scrape-prs -- \
            --pr-file verified_prs.txt \
            --out fodder/ || echo "Scraper reached timeout or failed, proceeding with what we have."

          # Update the registry based on what was actually written to fodder/
          # This ensures the registry is always in sync with the files
          find fodder -name "pr_*.txt" | sed 's/fodder\/pr_//;s/\.txt//' >> fodder/.scraped_prs
          sort -u fodder/.scraped_prs -o fodder/.scraped_prs

          echo "Total scraped PRs in registry: $(wc -l < fodder/.scraped_prs)"

      # ── Stats snapshot ───────────────────────────────────────────────
      - name: Write run stats
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          STATS_FILE="fodder/.last_run.json"
          NEW_COUNT=$(wc -l < new_prs.txt 2>/dev/null || echo 0)
          TOTAL=$(wc -l < fodder/.scraped_prs 2>/dev/null || echo 0)
          cat > "$STATS_FILE" <<EOF
          {
            "last_run": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "new_prs_this_run": ${NEW_COUNT},
            "total_prs_scraped": ${TOTAL},
            "triggered_by": "${{ github.event_name }}"
          }
          EOF
          cat "$STATS_FILE"

      # ── Commit & push ────────────────────────────────────────────────
      - name: Commit and push fodder
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add fodder/
          # Only commit if there's actually something new
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            NEW_COUNT=$(wc -l < new_prs.txt 2>/dev/null || echo 0)
            TOTAL=$(wc -l < fodder/.scraped_prs 2>/dev/null || echo 0)
            
            git commit -m "chore(fodder): add ${NEW_COUNT} PRs [total: ${TOTAL}]" \
                       -m "Triggered by: ${{ github.event_name }}" \
                       -m "Run: ${{ github.run_id }}"
            
            for i in {1..5}; do
              git pull --rebase origin main && git push origin main && break || sleep 10
            done
          fi

          fi
